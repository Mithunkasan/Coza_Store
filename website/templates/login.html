<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }
        .box{
            width:350px;
            margin:80px auto;
            padding:25px;
            background:white;
            border-radius:8px;
            box-shadow:0 0 10px #ccc;
            text-align:center;
        }
        input{
            width:90%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }
        button{
            width:95%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }
        button:hover{
            background:#0056b3;
        }
        a{ color:#007bff; text-decoration:none;}
        .error{ color:red; }
    </style>
</head>
<body>

<div class="box">
    <h2>Login 🔐</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username"
               placeholder="Username" required>

        <input type="password" name="password"
               placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p>Don't have an account?
        <a href="{% url 'signup' %}">Signup</a>
    </p>
</div>

</body>
</html>
